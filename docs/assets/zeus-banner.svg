      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#101720" flood-opacity="0.12"/>
