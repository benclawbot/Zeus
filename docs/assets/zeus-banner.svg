<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Zeus - The God Coding Agent</title>
  <desc id="desc">A dark cinematic Zeus hero banner showing the production-ready Tauri desktop coding-agent shell, MiniMax chat, local memory, skills, sessions, attachments and harness evolution.</desc>
  <defs>
    <radialGradient id="storm" cx="62%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1c6cff" stop-opacity="0.58"/>
      <stop offset="38%" stop-color="#0c1832"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#050914"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="48%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.55 0 0 0 0 1 0 0 0 0.75 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;letter-spacing:.16em;text-transform:uppercase;fill:#7dd3fc;font-weight:800}
      .body{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#94a3b8}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#f8fafc;font-weight:900;letter-spacing:.08em}
    </style>
  </defs>
  <rect width="1600" height="520" fill="url(#storm)"/>
  <path d="M0 392 C190 333 326 430 516 372 C742 303 886 342 1045 270 C1231 187 1391 220 1600 132 L1600 520 L0 520 Z" fill="#020617" opacity="0.62"/>
  <g opacity="0.48" stroke="#1d4ed8" stroke-width="2" fill="none">
    <path d="M920 0 872 76 900 91 834 180 882 111 850 95 905 0"/>
    <path d="M1195 0 1154 90 1186 104 1127 186"/>
    <path d="M730 60 681 126 708 139 651 210"/>
  </g>
  <g transform="translate(70 82)">
    <g filter="url(#glow)">
      <path d="M64 0 10 91h46L33 178 125 55H76z" fill="url(#bolt)"/>
    </g>
    <text x="158" y="68" class="title" font-size="78">ZEUS</text>
    <text x="158" y="128" class="title" font-size="42">THE <tspan fill="#38bdf8">GOD</tspan> CODING AGENT</text>
    <text x="4" y="205" class="body" font-size="25">Local-first Tauri desktop shell for focused coding-agent sessions,</text>
    <text x="4" y="238" class="body" font-size="25">real provider calls, persistent context, skills, and visible harness evolution.</text>
    <g transform="translate(0 284)" class="label" font-size="16">
      <rect width="176" height="48" rx="14" fill="#0b1220" stroke="#2563eb"/>
      <text x="24" y="31">Tauri + React</text>
      <rect x="198" width="178" height="48" rx="14" fill="#0b1220" stroke="#2563eb"/>
      <text x="222" y="31">MiniMax Chat</text>
      <rect x="398" width="170" height="48" rx="14" fill="#0b1220" stroke="#2563eb"/>
      <text x="422" y="31">SQLite Memory</text>
      <rect x="590" width="144" height="48" rx="14" fill="#0b1220" stroke="#2563eb"/>
      <text x="618" y="31">Skills</text>
    </g>
  </g>
  <g transform="translate(655 108)" filter="url(#softShadow)">
    <rect width="494" height="296" rx="24" fill="url(#panel)" stroke="#1e40af"/>
    <rect x="24" y="24" width="130" height="18" rx="9" fill="#1d4ed8"/>
    <rect x="24" y="62" width="208" height="14" rx="7" fill="#334155"/>
    <rect x="24" y="96" width="446" height="72" rx="16" fill="#07111f" stroke="#1e293b"/>
    <text x="48" y="126" class="body" font-size="17">Session: Refactor auth</text>
    <text x="48" y="150" class="small" font-size="14">/goal set • image pasted • skill active</text>
    <rect x="24" y="190" width="216" height="72" rx="16" fill="#07111f" stroke="#1e293b"/>
    <text x="48" y="220" class="body" font-size="17">Harness proposal</text>
    <text x="48" y="244" class="small" font-size="14">edit • approve • rollback</text>
    <rect x="262" y="190" width="208" height="72" rx="16" fill="#07111f" stroke="#1e293b"/>
    <text x="286" y="220" class="body" font-size="17">Context memory</text>
    <text x="286" y="244" class="small" font-size="14">compact • persist • restore</text>
  </g>
  <g transform="translate(1215 74)">
    <rect width="310" height="372" rx="24" fill="#07111f" stroke="#1e40af" opacity="0.94"/>
    <text x="30" y="48" class="label" font-size="17">Production ready</text>
    <g class="body" font-size="18">
      <text x="30" y="96">✓ Desktop app shell</text>
      <text x="30" y="140">✓ MiniMax M3 bridge</text>
      <text x="30" y="184">✓ SQLite sessions</text>
      <text x="30" y="228">✓ Skill discovery</text>
      <text x="30" y="272">✓ Harness workflow</text>
      <text x="30" y="316">✓ Attachments + image paste</text>
    </g>
  </g>
  <g transform="translate(1040 38)" opacity="0.85">
    <circle cx="88" cy="120" r="70" fill="#0f172a" stroke="#38bdf8"/>
    <path d="M88 45 C122 61 136 94 128 128 C119 166 84 187 52 171 C86 156 92 125 82 96 C75 78 78 58 88 45Z" fill="#94a3b8"/>
    <path d="M58 145 C88 126 104 94 88 54 C126 81 134 135 102 166 C88 180 70 178 58 145Z" fill="#e2e8f0" opacity="0.9"/>
    <path d="M112 105 86 143h22l-19 38 52-60h-28z" fill="url(#bolt)" filter="url(#glow)"/>
  </g>
</svg>
